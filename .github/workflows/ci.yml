name: CI

on:
  push:
    branches: [ main, lya_fit_update ]
  pull_request:
    branches: [ main, lya_fit_update ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MUSE_DATA_DIR: tests/test_data
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.13'
    - name: Install TANGELO with dependencies
      run: |
        uv venv
        uv pip install -e ".[dev]"
    - name: Run tests
      run: |
        uv run pytest
